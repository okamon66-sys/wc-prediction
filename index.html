<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W杯優勝予想バトル 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --bg: #0a0e1a;
    --surface: #131828;
    --surface2: #1c2438;
    --border: rgba(245,200,66,0.2);
    --text: #e8ecf4;
    --muted: #7a839a;
    --red: #e84545;
    --green: #3ddc84;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(245,200,66,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, rgba(61,100,200,0.08) 0%, transparent 60%);
  }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 20px 80px; }
  .header { text-align: center; padding: 32px 0 40px; }
  .header-eyebrow { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.3em; color: var(--gold); margin-bottom: 8px; }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 10vw, 72px); line-height: 0.9; letter-spacing: 0.02em; }
  .header-title span { color: var(--gold); }
  .rule-badge { display: flex; gap: 8px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
  .rule-pill { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--gold); }
  .setup-banner { background: var(--surface2); border: 1px solid var(--gold); border-radius: 10px; padding: 16px; margin-bottom: 24px; display: none; }
  .setup-banner.visible { display: block; }
  .setup-label { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
  .setup-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 13px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .setup-btn { margin-top: 8px; width: 100%; padding: 10px; background: var(--gold); color: var(--bg); border: none; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.1em; cursor: pointer; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 28px; }
  .tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; background: none; border-left: none; border-right: none; border-top: none; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field input[type=text] { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 15px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; outline: none; }
  .sel-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .sel-box { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 4px; text-align: center; }
  .sel-box .rank-label { font-size: 11px; margin-bottom: 4px; }
  .sel-box .sel-name { font-size: 12px; color: var(--muted); }
  .hint { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 12px; }
  .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .country-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 8px; text-align: center; cursor: pointer; font-size: 13px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; position: relative; }
  .country-btn:hover { border-color: rgba(245,200,66,0.5); background: var(--surface2); }
  .country-btn.selected { border-color: var(--gold); background: rgba(245,200,66,0.1); color: var(--gold); font-weight: 700; }
  .rank-badge { position: absolute; top: 3px; right: 5px; font-size: 11px; }
  .submit-btn { width: 100%; padding: 16px; background: var(--gold); color: var(--bg); border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.1em; cursor: pointer; margin-top: 16px; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .entry-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: center; }
  .entry-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
  .entry-name { font-size: 14px; font-weight: 700; }
  .entry-picks { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .pick-chip { font-size: 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 8px; }
  .count-badge { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--muted); margin-left: 8px; }
  .result-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .result-row label { font-size: 12px; color: var(--muted); min-width: 60px; }
  .result-select { background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; outline: none; flex: 1; }
  .calc-btn { width: 100%; padding: 13px; background: transparent; color: var(--gold); border: 0.5px solid var(--gold); border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.1em; cursor: pointer; margin-top: 8px; }
  .winner-banner { background: rgba(245,200,66,0.1); border: 1px solid var(--gold); border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 16px; }
  .winner-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); }
  .winner-prize { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .winner-prize strong { color: var(--green); font-size: 18px; }
  .ranking-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
  .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 22px; width: 28px; text-align: center; }
  .rank-pos.p1 { color: var(--gold); } .rank-pos.p2 { color: #b0bec5; } .rank-pos.p3 { color: #cd7c3b; } .rank-pos.pn { color: var(--muted); }
  .rank-payout { font-size: 13px; color: var(--green); } .rank-payout.lose { color: var(--red); }
  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0a0e1a; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); color: #fff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-eyebrow">FIFA World Cup 2026</div>
    <div class="header-title">優勝<span>予想</span><br>バトル</div>
    <div class="rule-badge">
      <span class="rule-pill">優勝的中 7pt</span>
      <span class="rule-pill">準優勝 5pt</span>
      <span class="rule-pill">3位 3pt</span>
      <span class="rule-pill">1位総取り</span>
    </div>
  </div>
 
  <div class="setup-banner" id="setupBanner">
    <div class="setup-label">⚙️ 初回設定：Google Apps Script の URL を入力してください</div>
    <input class="setup-input" type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/xxxxxx/exec">
    <button class="setup-btn" onclick="saveGasUrl()">設定して始める</button>
  </div>
 
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vote')">投票する</button>
    <button class="tab" onclick="switchTab('entries')">エントリー <span id="entryCount" class="count-badge">-</span></button>
    <button class="tab" onclick="switchTab('result')">結果・精算</button>
  </div>
 
  <div class="tab-pane active" id="pane-vote">
    <div class="field">
      <label>ニックネーム</label>
      <input type="text" id="nickname" placeholder="例: タロウ" maxlength="20">
    </div>
    <div class="sel-bar">
      <div class="sel-box">
        <div class="rank-label" style="color:var(--gold);">🥇 優勝 7pt</div>
        <div class="sel-name" id="sel1-name">タップして選択</div>
      </div>
      <div class="sel-box">
        <div class="rank-label" style="color:#b0bec5;">🥈 準優勝 5pt</div>
        <div class="sel-name" id="sel2-name">タップして選択</div>
      </div>
      <div class="sel-box">
        <div class="rank-label" style="color:#cd7c3b;">🥉 3位 3pt</div>
        <div class="sel-name" id="sel3-name">タップして選択</div>
      </div>
    </div>
    <div class="hint">クリックした順に 1位→2位→3位 が確定。もう一度クリックで解除。</div>
    <div class="country-grid" id="countryGrid"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitVote()">投票する</button>
  </div>
 
  <div class="tab-pane" id="pane-entries">
    <div id="entriesList"></div>
  </div>
 
  <div class="tab-pane" id="pane-result">
    <div class="section-title">実際の結果を入力</div>
    <div class="result-row"><label>🥇 優勝国</label><select class="result-select" id="res1"></select></div>
    <div class="result-row"><label>🥈 準優勝</label><select class="result-select" id="res2"></select></div>
    <div class="result-row"><label>🥉 3位</label><select class="result-select" id="res3"></select></div>
    <div class="field" style="margin-top:16px;">
      <label>一人あたり拠出額（円）</label>
      <input type="text" id="stakeInput" value="10000">
    </div>
    <button class="calc-btn" onclick="calcResult()">得点・配分を計算する</button>
    <div id="resultOutput" style="margin-top:20px;"></div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const COUNTRIES = [
  'アルゼンチン','ブラジル','コロンビア','エクアドル','パラグアイ','ウルグアイ',
  'スペイン','フランス','イングランド','ドイツ','ポルトガル','オランダ',
  'ベルギー','クロアチア','デンマーク','オーストリア','スコットランド','ハンガリー',
  'ルーマニア','スロバキア','スイス','セルビア','チェコ','トルコ','ノルウェー','ウクライナ',
  'アメリカ','メキシコ','カナダ','パナマ','ホンジュラス','キュラソー',
  '日本','韓国','オーストラリア','イラン','サウジアラビア','イラク','ヨルダン','ウズベキスタン',
  'モロッコ','エジプト','セネガル','コートジボワール','ナイジェリア','南アフリカ','カメルーン','チュニジア',
  'ニュージーランド'
];
 
const RANK_COLORS = {1:'var(--gold)', 2:'#b0bec5', 3:'#cd7c3b'};
const RANK_MEDALS = {1:'🥇', 2:'🥈', 3:'🥉'};
let picks = {1:null, 2:null, 3:null};
let GAS_URL = localStorage.getItem('wc_gas_url') || '';
let cachedEntries = [];
 
function saveGasUrl() {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url.startsWith('https://script.google.com')) { showToast('URLが正しくありません', true); return; }
  GAS_URL = url;
  localStorage.setItem('wc_gas_url', url);
  document.getElementById('setupBanner').classList.remove('visible');
  showToast('設定完了！');
  loadEntries();
}
 
function buildGrid() {
  const el = document.getElementById('countryGrid');
  el.innerHTML = COUNTRIES.map(name =>
    `<button class="country-btn" data-name="${name}" onclick="pickCountry('${name}')">${name}</button>`
  ).join('');
}
 
function pickCountry(name) {
  const currentRank = [1,2,3].find(r => picks[r] === name);
  if (currentRank) {
    picks[currentRank] = null;
    if (currentRank === 1 && picks[2]) { picks[1] = picks[2]; picks[2] = picks[3]; picks[3] = null; }
    else if (currentRank === 2 && picks[3]) { picks[2] = picks[3]; picks[3] = null; }
  } else {
    const next = [1,2,3].find(r => !picks[r]);
    if (!next) { showToast('すでに3カ国選択済みです。解除してから選んでください', true); return; }
    picks[next] = name;
  }
  updateSelectionUI();
}
 
function updateSelectionUI() {
  [1,2,3].forEach(r => {
    const el = document.getElementById('sel' + r + '-name');
    if (picks[r]) { el.textContent = picks[r]; el.style.color = RANK_COLORS[r]; }
    else { el.textContent = 'タップして選択'; el.style.color = 'var(--muted)'; }
  });
  document.querySelectorAll('.country-btn').forEach(btn => {
    const rank = [1,2,3].find(r => picks[r] === btn.dataset.name);
    btn.className = 'country-btn' + (rank ? ' selected' : '');
    let badge = btn.querySelector('.rank-badge');
    if (rank) {
      if (!badge) { badge = document.createElement('span'); badge.className = 'rank-badge'; btn.appendChild(badge); }
      badge.textContent = RANK_MEDALS[rank];
    } else {
      if (badge) badge.remove();
    }
  });
}
 
function buildResultSelects() {
  const opts = '<option value="">---</option>' + COUNTRIES.map(n => `<option value="${n}">${n}</option>`).join('');
  ['res1','res2','res3'].forEach(id => { document.getElementById(id).innerHTML = opts; });
}
 
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['vote','entries','result'][i] === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  if (tab === 'entries' || tab === 'result') loadEntries();
}
 
async function loadEntries() {
  if (!GAS_URL) return;
  const el = document.getElementById('entriesList');
  if (el) el.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const res = await fetch(GAS_URL + '?action=getEntries');
    const data = await res.json();
    cachedEntries = data.entries || [];
    document.getElementById('entryCount').textContent = cachedEntries.length;
    renderEntries();
  } catch(e) {
    if (el) el.innerHTML = '<div class="empty">データの取得に失敗しました</div>';
  }
}
 
function renderEntries() {
  const el = document.getElementById('entriesList');
  if (!el) return;
  if (!cachedEntries.length) { el.innerHTML = '<div class="empty">まだ投票がありません</div>'; return; }
  el.innerHTML = cachedEntries.map(e => `
    <div class="entry-card">
      <div class="entry-avatar">${e.name[0]}</div>
      <div style="flex:1">
        <div class="entry-name">${e.name}</div>
        <div class="entry-picks">
          <span class="pick-chip">🥇 ${e.p1}</span>
          <span class="pick-chip">🥈 ${e.p2}</span>
          <span class="pick-chip">🥉 ${e.p3}</span>
        </div>
      </div>
    </div>`).join('');
}
 
async function submitVote() {
  if (!GAS_URL) { showToast('先にGAS URLを設定してください', true); return; }
  const name = document.getElementById('nickname').value.trim();
  if (!name) { showToast('ニックネームを入力してください', true); return; }
  if (!picks[1] || !picks[2] || !picks[3]) { showToast('1〜3位をすべて選択してください', true); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action:'addEntry', name, p1:picks[1], p2:picks[2], p3:picks[3] })
    });
    // no-corsではレスポンスが読めないため成功とみなす
    const data = { ok: true };
    if (data.ok) {
      picks = {1:null, 2:null, 3:null};
      document.getElementById('nickname').value = '';
      updateSelectionUI();
      showToast('投票完了！');
      loadEntries();
    } else if (data.error === 'duplicate') {
      showToast('そのニックネームはすでに投票済みです', true);
    } else {
      showToast('エラーが発生しました', true);
    }
  } catch(e) {
    showToast('通信エラーです', true);
  } finally {
    btn.disabled = false; btn.textContent = '投票する';
  }
}
 
function calcResult() {
  const r1 = document.getElementById('res1').value;
  const r2 = document.getElementById('res2').value;
  const r3 = document.getElementById('res3').value;
  const stake = parseInt(document.getElementById('stakeInput').value) || 10000;
  if (!r1 || !r2 || !r3) { showToast('1〜3位をすべて入力してください', true); return; }
  if (!cachedEntries.length) { document.getElementById('resultOutput').innerHTML = '<div class="empty">先に「エントリー」タブを開いてデータを読み込んでください</div>'; return; }
  const pool = cachedEntries.length * stake;
  const scored = cachedEntries.map(e => {
    let pt = 0;
    if (e.p1 === r1) pt += 7;
    if (e.p2 === r2) pt += 5;
    if (e.p3 === r3) pt += 3;
    return {...e, pt};
  }).sort((a,b) => b.pt - a.pt);
  const maxPt = scored[0].pt;
  const winners = scored.filter(e => e.pt === maxPt);
  const prizeEach = maxPt > 0 ? Math.round(pool / winners.length) : 0;
  let html = maxPt > 0
    ? `<div class="winner-banner"><div style="font-size:32px;">🏆</div><div class="winner-name">${winners.map(w=>w.name).join(' & ')}</div><div class="winner-prize">獲得賞金 <strong>¥${prizeEach.toLocaleString()}</strong>${winners.length > 1 ? ' (山分け)' : ''}</div></div>`
    : `<div class="winner-banner" style="border-color:var(--muted)"><div style="font-size:32px;">😅</div><div class="winner-name" style="color:var(--muted);font-size:22px;">全員ハズレ</div></div>`;
  html += `<div class="section-title">最終ランキング（総プール ¥${pool.toLocaleString()}）</div>`;
  scored.forEach((e,i) => {
    const isWinner = e.pt === maxPt && maxPt > 0;
    const net = (isWinner ? prizeEach : 0) - stake;
    const cls = ['','p1','p2','p3'][i+1] || 'pn';
    html += `<div class="ranking-row">
      <div class="rank-pos ${cls}">${i+1}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;">${e.name}</div>
      <div style="font-size:11px;color:var(--muted);">${e.p1} / ${e.p2} / ${e.p3}</div></div>
      <div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;">${e.pt}pt</div>
      <div class="rank-payout ${net>=0?'':'lose'}">${net>=0?'+':''}${net.toLocaleString()}円</div></div>
    </div>`;
  });
  document.getElementById('resultOutput').innerHTML = html;
}
 
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 2400);
}
 
// Init
if (GAS_URL) {
  loadEntries();
} else {
  document.getElementById('setupBanner').classList.add('visible');
}
buildGrid();
buildResultSelects();
</script>
</body>
</html>
